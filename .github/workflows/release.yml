name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        run: pio run -e gh_release

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          TAG=${{ github.ref_name }}
          cp .pio/build/gh_release/bootloader.bin  release-assets/crosspoint-${TAG}-bootloader.bin
          cp .pio/build/gh_release/firmware.bin    release-assets/crosspoint-${TAG}.bin
          cp .pio/build/gh_release/firmware.elf    release-assets/crosspoint-${TAG}.elf
          cp .pio/build/gh_release/firmware.map    release-assets/crosspoint-${TAG}.map
          cp .pio/build/gh_release/partitions.bin  release-assets/crosspoint-${TAG}-partitions.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CrossPoint ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
